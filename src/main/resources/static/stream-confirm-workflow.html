<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 魔法工作流系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
            'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 100%;
            flex-shrink: 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* 魔法按钮 */
        .magic-button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .magic-button {
            position: relative;
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .magic-button::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(20px);
        }

        .magic-button:hover:not(:disabled) {
            transform: scale(1.15) rotate(180deg);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.8);
        }

        .magic-button:hover:not(:disabled)::before {
            opacity: 1;
        }

        .magic-button:active:not(:disabled) {
            transform: scale(0.95) rotate(180deg);
        }

        .magic-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .button-label {
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        /* 状态指示器 */
        .status-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
            transition: all 0.3s;
        }

        .status-dot.active {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
            animation: glow 1.5s infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px #4caf50;
            }
            50% {
                box-shadow: 0 0 20px #4caf50;
            }
        }

        /* 聊天容器 */
        .chat-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            max-height: 100%;
        }

        .chat-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            min-height: 0; /* 重要：允许 flex 子元素滚动 */
        }

        /* 消息样式 */
        .message {
            animation: messageSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-content {
            padding: 15px 20px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .message.system .message-content {
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.2), rgba(3, 169, 244, 0.2));
            color: #90caf9;
            border-left: 4px solid #2196f3;
            margin-right: auto;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .message.success .message-content {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(139, 195, 74, 0.2));
            color: #a5d6a7;
            border-left: 4px solid #4caf50;
            margin-right: auto;
        }

        .message.error .message-content {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.2), rgba(233, 30, 99, 0.2));
            color: #ef9a9a;
            border-left: 4px solid #f44336;
            margin-right: auto;
        }

        /* 流式输出光标 */
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 20px;
            background: #667eea;
            margin-left: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }

        /* 模态对话框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .modal-title {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .modal-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            color: white;
            line-height: 1.8;
            max-height: 50vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            flex-shrink: 0;
        }

        .modal-content strong {
            color: #ffd54f;
            display: block;
            margin-bottom: 10px;
        }

        .modal-content-detail {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* 滚动提示 */
        .modal-content::after {
            content: '';
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to top, rgba(102, 126, 234, 0.3), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-content.has-scroll::after {
            opacity: 1;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        /* 输入表单样式 */
        .input-form {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .modal-button.regenerate {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
        }

        /* 滚动指示器 */
        .scroll-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            animation: bounce-arrow 2s infinite;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .scroll-indicator.show {
            opacity: 0.8;
        }

        @keyframes bounce-arrow {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        .modal-button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .modal-button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .modal-button.confirm {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
        }

        .modal-button.reject {
            background: linear-gradient(135deg, #f44336, #e57373);
            color: white;
        }

        .modal-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) rgba(255, 255, 255, 0.1);
        }

        /* 响应式设计 */
        @media (max-width: 968px) {
            .main-container {
                flex-direction: column;
                height: auto;
                max-height: 95vh;
            }

            .control-panel {
                width: 100%;
                flex-shrink: 0;
            }

            .chat-container {
                flex: 1;
                min-height: 500px;
                max-height: 70vh;
            }
        }

        /* 欢迎信息 */
        .welcome-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 40px 20px;
        }

        .welcome-message h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .welcome-message p {
            font-size: 16px;
            line-height: 1.8;
        }

        .workflow-steps {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .workflow-steps h4 {
            color: #90caf9;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .workflow-steps ul {
            list-style: none;
            padding: 0;
        }

        .workflow-steps li {
            padding: 8px 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .workflow-steps li::before {
            content: '✨ ';
            margin-right: 8px;
        }
    </style>
</head>
<body>
<!-- 粒子背景 -->
<div class="particles" id="particles"></div>

<!-- 主容器 -->
<div class="main-container">
    <!-- 左侧控制面板 -->
    <div class="control-panel">
        <div class="logo">
            <h1>🌟 魔法工作流</h1>
            <p>Magical Workflow System</p>
        </div>

        <div class="magic-button-container">
            <button id="magicButton" class="magic-button" onclick="startWorkflow()">
                🪄
            </button>
            <div class="button-label">点击启动魔法</div>
        </div>

        <div class="status-panel">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">未连接</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="workflowStatus"></div>
                <span id="workflowText">等待启动</span>
            </div>
        </div>
    </div>

    <!-- 聊天对话框 -->
    <div class="chat-container">
        <div class="chat-header">
            <h2>💬 工作流对话</h2>
            <p>实时显示工作流执行状态</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h3>欢迎使用魔法工作流系统 ✨</h3>
                <p>点击左侧的魔法棒按钮开始您的魔法之旅！</p>
                <div class="workflow-steps">
                    <h4>📋 工作流程</h4>
                    <ul>
                        <li>输入游玩日期和人数</li>
                        <li>AI 生成个性化行程 → 确认/拒绝/重新生成</li>
                        <li>AI 生成订单信息 → 确认/拒绝/重新生成</li>
                        <li>完成整个流程</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 确认模态对话框 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-icon" id="modalIcon">❓</div>
            <div class="modal-title" id="modalTitle">确认操作</div>
            <div class="modal-subtitle" id="modalSubtitle">请仔细查看以下信息</div>
        </div>
        <div class="modal-content" id="modalContent">
            <!-- 动态内容 -->
        </div>
        <div class="scroll-indicator" id="scrollIndicator">⬇️</div>
        <div class="modal-buttons" id="modalButtons">
            <button class="modal-button confirm" id="confirmBtn" onclick="handleConfirm('approved')">
                ✓ 确认
            </button>
            <button class="modal-button regenerate" id="regenerateBtn" onclick="handleConfirm('regenerate')" style="display: none;">
                🔄 重新生成
            </button>
            <button class="modal-button reject" id="rejectBtn" onclick="handleConfirm('rejected')">
                ✗ 拒绝
            </button>
        </div>
    </div>
</div>

<script>
    // 全局变量
    let currentSessionId = null;
    let userId = 'user_' + Date.now();
    let currentStreamingMessage = null;
    let currentConfirmationType = null;
    let currentConfirmationData = null;

    // DOM 元素
    const chatMessages = document.getElementById('chatMessages');
    const magicButton = document.getElementById('magicButton');
    const connectionStatus = document.getElementById('connectionStatus');
    const connectionText = document.getElementById('connectionText');
    const workflowStatus = document.getElementById('workflowStatus');
    const workflowText = document.getElementById('workflowText');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const modalContent = document.getElementById('modalContent');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const confirmBtn = document.getElementById('confirmBtn');
    const rejectBtn = document.getElementById('rejectBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');

    // HTML转义函数，防止XSS攻击
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 初始化粒子效果
    function initParticles() {
        const particlesContainer = document.getElementById('particles');
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // 添加消息
    function addMessage(content, type = 'assistant') {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = content;

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        return messageDiv;
    }

    // 创建流式消息
    function addStreamingMessage() {
        // 清除欢迎消息
        const welcome = chatMessages.querySelector('.welcome-message');
        if (welcome) {
            welcome.remove();
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.style.minHeight = '20px';

        const cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        contentDiv.appendChild(cursor);

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        return contentDiv;
    }

    // 追加流式内容
    function appendToStreamingMessage(messageElement, content) {
        const cursor = messageElement.querySelector('.typing-cursor');
        if (cursor) {
            cursor.remove();
        }

        const textNode = document.createTextNode(content);
        messageElement.appendChild(textNode);

        const newCursor = document.createElement('span');
        newCursor.className = 'typing-cursor';
        messageElement.appendChild(newCursor);

        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 移除流式光标
    function removeStreamingCursor(messageElement) {
        const cursor = messageElement.querySelector('.typing-cursor');
        if (cursor) {
            cursor.remove();
        }
    }

    // 更新连接状态
    function updateConnectionStatus(status, text) {
        connectionText.textContent = text;
        if (status === 'active') {
            connectionStatus.classList.add('active');
        } else {
            connectionStatus.classList.remove('active');
        }
    }

    // 更新工作流状态
    function updateWorkflowStatus(status, text) {
        workflowText.textContent = text;
        if (status === 'active') {
            workflowStatus.classList.add('active');
        } else {
            workflowStatus.classList.remove('active');
        }
    }

    // 显示确认对话框
    function showConfirmationModal(confirmationType, data) {
        currentConfirmationType = confirmationType;
        currentConfirmationData = data;

        // 默认隐藏重新生成按钮
        regenerateBtn.style.display = 'none';

        if (confirmationType === 'INPUT_DATE') {
            // 输入游玩日期
            modalIcon.textContent = '📅';
            modalTitle.textContent = '游玩日期';
            modalSubtitle.textContent = '请输入您的游玩日期';

            modalContent.innerHTML = `
                <div class="input-form">
                    <div class="form-group">
                        <label class="form-label" for="visitDateInput">请选择游玩日期：</label>
                        <input type="date" id="visitDateInput" class="form-input" 
                               min="${new Date().toISOString().split('T')[0]}" 
                               required>
                    </div>
                </div>
            `;

            // 修改按钮文本
            confirmBtn.textContent = '✓ 确认';
            rejectBtn.style.display = 'none';

        } else if (confirmationType === 'INPUT_COUNT') {
            // 输入游玩人数
            modalIcon.textContent = '👥';
            modalTitle.textContent = '游玩人数';
            modalSubtitle.textContent = '请输入游玩人数';

            modalContent.innerHTML = `
                <div class="input-form">
                    <div class="form-group">
                        <label class="form-label" for="visitorCountInput">请输入游玩人数：</label>
                        <input type="number" id="visitorCountInput" class="form-input" 
                               min="1" max="20" value="1" 
                               placeholder="请输入1-20人" required>
                    </div>
                </div>
            `;

            // 修改按钮文本
            confirmBtn.textContent = '✓ 确认';
            rejectBtn.style.display = 'none';

        } else if (confirmationType === 'PLAN') {
            // 行程确认
            modalIcon.textContent = '📋';
            modalTitle.textContent = '行程计划确认';
            modalSubtitle.textContent = '请确认以下行程计划是否符合您的需求';

            let contentHtml = `<strong>行程编号：${data.planId || '生成中...'}</strong>`;

            if (data.details && data.details.trim() !== '') {
                contentHtml += `<div class="modal-content-detail">${escapeHtml(data.details).replace(/\n/g, '<br>')}</div>`;
            } else {
                contentHtml += `<div class="modal-content-detail">正在生成行程详情...</div>`;
            }

            modalContent.innerHTML = contentHtml;

            // 显示重新生成按钮
            regenerateBtn.style.display = 'flex';
            confirmBtn.textContent = '✓ 确认';
            rejectBtn.textContent = '✗ 拒绝';
            rejectBtn.style.display = 'flex';

        } else if (confirmationType === 'ORDER') {
            // 订单确认
            modalIcon.textContent = '🛍️';
            modalTitle.textContent = '订单确认';
            modalSubtitle.textContent = '请确认以下订单信息是否正确';

            let contentHtml = `
                <strong>订单编号：${data.orderId || '生成中...'}</strong>
                <strong>关联行程：${data.planId || '未知'}</strong>
            `;

            if (data.details && data.details.trim() !== '') {
                contentHtml += `<div class="modal-content-detail">${escapeHtml(data.details).replace(/\n/g, '<br>')}</div>`;
            } else {
                contentHtml += `<div class="modal-content-detail">正在生成订单详情...</div>`;
            }

            modalContent.innerHTML = contentHtml;

            // 显示重新生成按钮
            regenerateBtn.style.display = 'flex';
            confirmBtn.textContent = '✓ 确认';
            rejectBtn.textContent = '✗ 拒绝';
            rejectBtn.style.display = 'flex';
        }

        modalOverlay.classList.add('active');

        // 检测内容是否可滚动
        setTimeout(() => {
            checkModalScroll();
        }, 100);
    }

    // 检测模态内容是否可滚动
    function checkModalScroll() {
        const isScrollable = modalContent.scrollHeight > modalContent.clientHeight;
        const isAtBottom = modalContent.scrollTop + modalContent.clientHeight >= modalContent.scrollHeight - 10;

        if (isScrollable) {
            modalContent.classList.add('has-scroll');
            console.log('📜 内容可滚动，高度:', modalContent.scrollHeight, '容器高度:', modalContent.clientHeight);

            // 显示滚动指示器（如果不在底部）
            if (!isAtBottom) {
                scrollIndicator.classList.add('show');
            } else {
                scrollIndicator.classList.remove('show');
            }
        } else {
            modalContent.classList.remove('has-scroll');
            scrollIndicator.classList.remove('show');
        }
    }

    // 监听模态内容滚动事件
    if (modalContent) {
        modalContent.addEventListener('scroll', () => {
            const isAtBottom = modalContent.scrollTop + modalContent.clientHeight >= modalContent.scrollHeight - 10;
            if (isAtBottom) {
                scrollIndicator.classList.remove('show');
            } else if (modalContent.scrollHeight > modalContent.clientHeight) {
                scrollIndicator.classList.add('show');
            }
        });
    }

    // 隐藏确认对话框
    function hideConfirmationModal() {
        modalOverlay.classList.remove('active');
        modalContent.classList.remove('has-scroll');
        scrollIndicator.classList.remove('show');
        modalContent.scrollTop = 0; // 重置滚动位置
        currentConfirmationType = null;
        currentConfirmationData = null;
    }

    // 处理确认/拒绝/重新生成
    function handleConfirm(action) {
        console.log('🎯 用户操作:', action, '确认类型:', currentConfirmationType);
        
        // 禁用按钮
        confirmBtn.disabled = true;
        rejectBtn.disabled = true;
        regenerateBtn.disabled = true;

        let requestBody = {
            action: action,
            confirmType: currentConfirmationType
        };

        // 处理输入类型的确认
        if (currentConfirmationType === 'INPUT_DATE') {
            const visitDateInput = document.getElementById('visitDateInput');
            if (!visitDateInput || !visitDateInput.value) {
                alert('请选择游玩日期！');
                confirmBtn.disabled = false;
                return;
            }
            requestBody.visitDate = visitDateInput.value;
            console.log('📅 设置游玩日期:', requestBody.visitDate);
            addMessage(`📅 已设置游玩日期: ${visitDateInput.value}`, 'success');
        } else if (currentConfirmationType === 'INPUT_COUNT') {
            const visitorCountInput = document.getElementById('visitorCountInput');
            if (!visitorCountInput || !visitorCountInput.value) {
                alert('请输入游玩人数！');
                confirmBtn.disabled = false;
                return;
            }
            const count = parseInt(visitorCountInput.value);
            if (count < 1 || count > 20) {
                alert('游玩人数必须在1-20人之间！');
                confirmBtn.disabled = false;
                return;
            }
            requestBody.visitorCount = count;
            console.log('👥 设置游玩人数:', requestBody.visitorCount);
            addMessage(`👥 已设置游玩人数: ${count}人`, 'success');
        } else {
            // 行程或订单确认
            const actionText = action === 'approved' ? '确认' : 
                             action === 'rejected' ? '拒绝' : '重新生成';
            const typeText = currentConfirmationType === 'PLAN' ? '行程计划' : '订单';
            console.log(`📤 发送${actionText}请求: ${typeText}`);
            addMessage(`⏳ 正在处理您的${actionText}请求...`, 'system');
        }
        
        console.log('📤 发送确认请求到后端:', JSON.stringify(requestBody, null, 2));

        // 发送确认请求
        fetch(`/workflow/stream-confirm/confirm/${currentSessionId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(requestBody)
        })
            .then(response => {
                console.log('📥 响应状态:', response.status, response.statusText);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('✅ 确认响应:', data);
                if (data.success) {
                    console.log('✅ 操作成功:', data.message);
                } else {
                    console.warn('⚠️ 操作失败:', data.message);
                    addMessage('⚠️ ' + data.message, 'error');
                }
                hideConfirmationModal();

                // 重新启用按钮
                confirmBtn.disabled = false;
                rejectBtn.disabled = false;
                regenerateBtn.disabled = false;
            })
            .catch(error => {
                console.error('❌ 确认请求失败:', error);
                addMessage('⚠️ 确认请求失败: ' + error.message, 'error');
                hideConfirmationModal();
                confirmBtn.disabled = false;
                rejectBtn.disabled = false;
                regenerateBtn.disabled = false;
            });
    }

    // 启动工作流
    function startWorkflow() {
        console.log('🚀 启动工作流，用户ID:', userId);
        
        // 清除欢迎消息
        const welcome = chatMessages.querySelector('.welcome-message');
        if (welcome) {
            welcome.style.display = 'none';
        }

        // 禁用按钮
        magicButton.disabled = true;

        // 更新状态
        updateConnectionStatus('active', '连接中...');
        updateWorkflowStatus('active', '初始化中...');

        // 添加启动消息
        addMessage('🪄 <strong>魔法启动！</strong><br>正在连接工作流系统...', 'system');
        
        console.log('📡 发送SSE请求到: /workflow/stream-confirm/start');

        // 发送请求
        fetch('/workflow/stream-confirm/start', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                userId: userId
            })
        })
            .then(response => {
                console.log('📡 SSE响应状态:', response.status, response.statusText);
                console.log('📡 Content-Type:', response.headers.get('Content-Type'));
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                if (!response.body) {
                    throw new Error('响应体为空，无法建立流式连接');
                }

                updateConnectionStatus('active', '已连接');
                console.log('✅ SSE连接建立成功');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let eventCount = 0;

                function processStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            console.log('🏁 SSE流结束，总共接收 ' + eventCount + ' 个事件');
                            updateConnectionStatus('', '已断开');
                            updateWorkflowStatus('', '已完成');
                            magicButton.disabled = false;
                            
                            // 清除流式消息光标
                            if (currentStreamingMessage) {
                                removeStreamingCursor(currentStreamingMessage);
                                currentStreamingMessage = null;
                            }
                            return;
                        }

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();
                        
                        console.debug('📦 收到数据块，行数:', lines.length);

                        let currentEvent = null;
                        let currentData = '';
                        let currentId = '';

                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                currentEvent = line.substring(6).trim();
                                console.debug('📋 解析到event:', currentEvent);
                            } else if (line.startsWith('data:')) {
                                // 支持多行data字段
                                const dataLine = line.substring(5).trim();
                                if (currentData) {
                                    currentData += '\n' + dataLine;
                                } else {
                                    currentData = dataLine;
                                }
                                console.debug('📋 解析到data行，当前长度:', currentData.length);
                            } else if (line.startsWith('id:')) {
                                currentId = line.substring(3).trim();
                                console.debug('📋 解析到id:', currentId);
                            } else if (line.startsWith(':')) {
                                // 注释行，忽略
                                console.debug('📋 解析到注释');
                            } else if (line.trim() === '') {
                                // 空行表示一个完整的事件
                                if (currentEvent && currentData) {
                                    eventCount++;
                                    console.log(`✅ [事件 #${eventCount}] 解析成功:`, currentEvent, '数据长度:', currentData.length);
                                    handleSseEvent(currentEvent, currentData);
                                    currentEvent = null;
                                    currentData = '';
                                    currentId = '';
                                } else if (currentData) {
                                    // 没有event名称，使用默认的 'message'
                                    eventCount++;
                                    console.log(`✅ [事件 #${eventCount}] 默认事件 (message)`);
                                    handleSseEvent('message', currentData);
                                    currentEvent = null;
                                    currentData = '';
                                    currentId = '';
                                }
                            }
                        }

                        processStream();
                    }).catch(error => {
                        console.error('❌ 读取流错误:', error);
                        addMessage('⚠️ 连接错误: ' + error.message, 'error');
                        updateConnectionStatus('', '连接失败');
                        updateWorkflowStatus('', '执行失败');
                        magicButton.disabled = false;
                    });
                }

                processStream();
            })
            .catch(error => {
                console.error('❌ 启动工作流失败:', error);
                addMessage('⚠️ 启动工作流失败: ' + error.message, 'error');
                updateConnectionStatus('', '连接失败');
                updateWorkflowStatus('', '启动失败');
                magicButton.disabled = false;
            });
    }

    // 处理 SSE 事件
    function handleSseEvent(eventType, dataStr) {
        console.log('📨 收到事件:', eventType, '数据长度:', dataStr.length);

        try {
            const data = JSON.parse(dataStr);
            console.log('📦 解析后数据:', data);
            
            switch(eventType) {
                case 'workflow_start':
                    currentSessionId = data.sessionId;
                    console.log('✅ 会话ID:', currentSessionId);
                    addMessage('🚀 ' + data.message, 'system');
                    updateWorkflowStatus('active', '运行中');
                    break;

                case 'step_update':
                    let stepMessage = data.currentStep || '';
                    let nodeName = data.nodeName || '';
                    
                    // 只有非创建节点才显示完整消息，创建节点由 output_chunk 处理
                    if (nodeName !== 'create_plan' && nodeName !== 'create_order') {
                        // 友好化节点名称显示
                        let displayNodeName = nodeName;
                        switch(nodeName) {
                            case 'input_date':
                                displayNodeName = '输入游玩日期';
                                break;
                            case 'input_count':
                                displayNodeName = '输入游玩人数';
                                break;
                            case 'confirm_plan':
                                displayNodeName = '确认行程计划';
                                break;
                            case 'confirm_order':
                                displayNodeName = '确认订单信息';
                                break;
                            case 'resume_router':
                                displayNodeName = '恢复路由';
                                break;
                        }
                        addMessage(`📍 <strong>${displayNodeName}:</strong> ${stepMessage}`, 'assistant');
                    }
                    updateWorkflowStatus('active', nodeName);
                    break;

                case 'output_chunk':
                    // 流式输出行程或订单详情
                    if (!currentStreamingMessage) {
                        console.log('🌊 创建新的流式消息容器');
                        currentStreamingMessage = addStreamingMessage();
                    }
                    if (data.chunk) {
                        console.log('📝 追加chunk内容，长度:', data.chunk.length);
                        appendToStreamingMessage(currentStreamingMessage, data.chunk);
                    }
                    break;

                case 'confirmation_required':
                    console.log('🔔 需要确认:', data.confirmationType);
                    
                    // 清除当前的流式消息（如果有）
                    if (currentStreamingMessage) {
                        removeStreamingCursor(currentStreamingMessage);
                        currentStreamingMessage = null;
                    }
                    
                    // 根据不同的确认类型显示不同的提示
                    let confirmMessage = data.message || '请确认';
                    if (data.confirmationType === 'INPUT_DATE') {
                        addMessage('📅 ' + confirmMessage, 'system');
                    } else if (data.confirmationType === 'INPUT_COUNT') {
                        addMessage('👥 ' + confirmMessage, 'system');
                    } else if (data.confirmationType === 'PLAN') {
                        addMessage('📋 ' + confirmMessage, 'system');
                    } else if (data.confirmationType === 'ORDER') {
                        addMessage('🛍️ ' + confirmMessage, 'system');
                    } else {
                        addMessage('⏸️ ' + confirmMessage, 'system');
                    }
                    
                    updateWorkflowStatus('active', '等待确认');
                    showConfirmationModal(data.confirmationType, data);
                    break;

                case 'confirmation_result':
                    console.log('✅ 收到确认结果:', data);
                    // 显示后端发送的确认消息
                    addMessage(data.message, data.confirmed ? 'success' : 'error');
                    
                    // 更新工作流状态
                    if (data.confirmed) {
                        updateWorkflowStatus('active', '继续执行');
                    } else {
                        updateWorkflowStatus('', '已拒绝');
                    }
                    break;

                case 'workflow_complete':
                    // 清除流式消息
                    if (currentStreamingMessage) {
                        removeStreamingCursor(currentStreamingMessage);
                        currentStreamingMessage = null;
                    }
                    
                    addMessage('✅ ' + data.message +
                        (data.planId ? `<br>📋 行程ID: ${data.planId}` : '') +
                        (data.orderId ? `<br>🛍️ 订单ID: ${data.orderId}` : ''),
                        'success');
                    magicButton.disabled = false;
                    updateConnectionStatus('', '已断开');
                    updateWorkflowStatus('', '已完成');
                    break;

                case 'workflow_error':
                    addMessage('❌ ' + data.message + '<br>错误: ' + data.error, 'error');
                    magicButton.disabled = false;
                    updateConnectionStatus('', '已断开');
                    updateWorkflowStatus('', '执行失败');
                    break;

                default:
                    console.log('⚠️ 未知事件类型:', eventType, '数据:', dataStr.substring(0, 100));
            }
        } catch (error) {
            console.error('❌ 解析事件数据失败:', error);
            console.error('原始数据:', dataStr);
            console.error('事件类型:', eventType);
        }
    }

    // 初始化
    window.onload = function() {
        initParticles();
        console.log('🌟 魔法工作流系统已就绪');
        console.log('📋 支持的SSE事件类型:');
        console.log('  - workflow_start: 工作流启动');
        console.log('  - step_update: 步骤更新');
        console.log('  - output_chunk: 流式输出块');
        console.log('  - confirmation_required: 需要确认');
        console.log('  - workflow_complete: 工作流完成');
        console.log('  - workflow_error: 工作流错误');
        console.log('📋 支持的确认类型:');
        console.log('  - INPUT_DATE: 输入游玩日期');
        console.log('  - INPUT_COUNT: 输入游玩人数');
        console.log('  - PLAN: 行程计划确认');
        console.log('  - ORDER: 订单确认');
        console.log('📋 支持的操作类型:');
        console.log('  - approved: 确认');
        console.log('  - rejected: 拒绝');
        console.log('  - regenerate: 重新生成');
    };
</script>
