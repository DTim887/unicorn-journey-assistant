<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏨 酒店智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6c757d;
        }

        .status-dot.active {
            background: #28a745;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message.system {
            align-items: center;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
        }

        .message.system .message-content {
            background: #e7f3ff;
            color: #0066cc;
            font-size: 0.9em;
        }

        .message.success .message-content {
            background: #d4edda;
            color: #155724;
        }

        .message.error .message-content {
            background: #f8d7da;
            color: #721c24;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 确认模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 5px;
        }

        .modal-subtitle {
            color: #6c757d;
            font-size: 0.9em;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .btn-confirm {
            background: #28a745;
            color: white;
        }

        .btn-reject {
            background: #dc3545;
            color: white;
        }

        .btn-regenerate {
            background: #ffc107;
            color: #333;
        }

        .input-form {
            margin: 15px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
        }

        .form-input:focus {
            border-color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🏨 酒店智能助手</h1>
            <p>为您提供点餐、客房预订、叫醒服务等贴心服务</p>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">未连接</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="workflowStatus"></div>
                <span id="workflowText">就绪</span>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message system">
                <div class="message-content">
                    👋 您好！我是酒店智能助手。<br>
                    我可以帮您：<br>
                    • 🍽️ 点餐服务<br>
                    • 🛏️ 客房预订<br>
                    • 🔄 续约房间<br>
                    • ⏰ 叫醒服务<br>
                    • 🎩 礼宾服务<br>
                    请告诉我您的需求！
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="messageInput" 
                    placeholder="输入您的需求，例如：我要续约1203房间3天..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    发送
                </button>
            </div>
        </div>
    </div>

    <!-- 确认模态框 -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">📋</div>
                <h2 class="modal-title" id="modalTitle">请确认</h2>
                <p class="modal-subtitle" id="modalSubtitle">请确认以下内容</p>
            </div>
            <div class="modal-body" id="modalContent">
                <!-- 动态内容 -->
            </div>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn btn-confirm" id="confirmBtn" onclick="handleConfirm('approved')">
                    ✓ 确认
                </button>
                <button class="modal-btn btn-regenerate" id="regenerateBtn" onclick="handleConfirm('regenerate')">
                    🔄 重新生成
                </button>
                <button class="modal-btn btn-reject" id="rejectBtn" onclick="handleConfirm('rejected')">
                    ✗ 拒绝
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let currentConfirmationType = null;

        // 添加消息到聊天区域
        function addMessage(content, type = 'assistant') {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 更新连接状态
        function updateConnectionStatus(status, text) {
            const dot = document.getElementById('connectionStatus');
            const textElem = document.getElementById('connectionText');
            
            if (status === 'active') {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
            
            textElem.textContent = text;
        }

        // 更新工作流状态
        function updateWorkflowStatus(status, text) {
            const dot = document.getElementById('workflowStatus');
            const textElem = document.getElementById('workflowText');
            
            if (status === 'active') {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
            
            textElem.textContent = text;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) {
                alert('请输入消息！');
                return;
            }
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            
            // 启动工作流
            startWorkflow(message);
        }

        // 启动工作流
        function startWorkflow(userMessage) {
            updateConnectionStatus('active', '连接中...');
            updateWorkflowStatus('active', '启动中...');
            
            fetch('/journey-assistant/hotel-assistant/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    userId: 'user_' + Date.now(),
                    userMessage: userMessage
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                if (!response.body) {
                    throw new Error('响应体为空，无法建立流式连接');
                }
                
                updateConnectionStatus('active', '已连接');
                console.log('✅ SSE连接建立成功');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                function processStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            console.log('🏁 SSE流结束');
                            updateConnectionStatus('', '已断开');
                            updateWorkflowStatus('', '已完成');
                            document.getElementById('sendBtn').disabled = false;
                            return;
                        }
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();
                        
                        let currentEvent = null;
                        let currentData = '';
                        
                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                currentEvent = line.substring(6).trim();
                            } else if (line.startsWith('data:')) {
                                const dataLine = line.substring(5).trim();
                                if (currentData) {
                                    currentData += '\n' + dataLine;
                                } else {
                                    currentData = dataLine;
                                }
                            } else if (line.trim() === '') {
                                if (currentEvent && currentData) {
                                    handleSseEvent(currentEvent, currentData);
                                    currentEvent = null;
                                    currentData = '';
                                } else if (currentData) {
                                    handleSseEvent('message', currentData);
                                    currentData = '';
                                }
                            }
                        }
                        
                        processStream();
                    }).catch(error => {
                        console.error('❌ 读取流错误:', error);
                        addMessage('⚠️ 连接错误: ' + error.message, 'error');
                        updateConnectionStatus('', '连接失败');
                        updateWorkflowStatus('', '执行失败');
                        document.getElementById('sendBtn').disabled = false;
                    });
                }
                
                processStream();
            })
            .catch(error => {
                console.error('❌ 启动工作流失败:', error);
                addMessage('⚠️ 启动失败: ' + error.message, 'error');
                updateConnectionStatus('', '连接失败');
                updateWorkflowStatus('', '启动失败');
                document.getElementById('sendBtn').disabled = false;
            });
        }

        // 处理 SSE 事件
        function handleSseEvent(eventType, dataStr) {
            try {
                const data = JSON.parse(dataStr);
                const actualEventType = data.sseEventType || eventType;
                
                switch(actualEventType) {
                    case 'workflow_start':
                        currentSessionId = data.sessionId;
                        console.log('✅ 会话ID:', currentSessionId);
                        addMessage('🚀 ' + data.message, 'system');
                        updateWorkflowStatus('active', '运行中');
                        break;
                    
                    case 'step_update':
                        console.log('📍 步骤更新:', data.nodeName);
                        updateWorkflowStatus('active', data.nodeName);
                        break;
                    
                    case 'output_chunk':
                        if (data.content) {
                            addMessage(data.content, 'assistant');
                        }
                        break;
                    
                    case 'confirmation_required':
                        currentConfirmationType = data.confirmationType;
                        console.log('⏸️ 等待确认:', currentConfirmationType);
                        updateWorkflowStatus('active', '等待确认');
                        showConfirmationModal(data.confirmationType, data);
                        break;
                    
                    case 'workflow_complete':
                        addMessage('✅ ' + data.message, 'success');
                        updateWorkflowStatus('', '已完成');
                        document.getElementById('sendBtn').disabled = false;
                        break;
                    
                    case 'workflow_error':
                        addMessage('❌ ' + data.message + '<br>错误: ' + data.error, 'error');
                        updateWorkflowStatus('', '执行失败');
                        document.getElementById('sendBtn').disabled = false;
                        break;
                    
                    default:
                        console.warn('未知事件:', actualEventType);
                        break;
                }
            } catch (error) {
                console.error('解析事件失败:', error);
            }
        }

        // 显示确认模态框
        function showConfirmationModal(confirmationType, data) {
            const modal = document.getElementById('confirmModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalSubtitle = document.getElementById('modalSubtitle');
            const modalContent = document.getElementById('modalContent');
            const confirmBtn = document.getElementById('confirmBtn');
            const regenerateBtn = document.getElementById('regenerateBtn');
            const rejectBtn = document.getElementById('rejectBtn');
            
            // 根据确认类型设置模态框内容
            if (confirmationType === 'MENU') {
                modalIcon.textContent = '🍽️';
                modalTitle.textContent = '菜单确认';
                modalSubtitle.textContent = '请确认菜单是否满意';
                modalContent.innerHTML = '<p>上方已显示为您生成的菜单，您可以选择确认、拒绝或重新生成。</p>';
                confirmBtn.style.display = 'inline-block';
                regenerateBtn.style.display = 'inline-block';
                rejectBtn.style.display = 'inline-block';
            } else if (confirmationType === 'INPUT_PARAMS') {
                modalIcon.textContent = '📝';
                modalTitle.textContent = '补充信息';
                modalSubtitle.textContent = data.message || '请提供以下信息';
                modalContent.innerHTML = `
                    <div class="input-form">
                        <div class="form-group">
                            <label class="form-label">请输入信息：</label>
                            <input type="text" id="paramInput" class="form-input" placeholder="请输入...">
                        </div>
                    </div>
                `;
                confirmBtn.textContent = '✓ 提交';
                confirmBtn.style.display = 'inline-block';
                regenerateBtn.style.display = 'none';
                rejectBtn.style.display = 'none';
            } else {
                modalIcon.textContent = '❓';
                modalTitle.textContent = '请确认';
                modalSubtitle.textContent = data.message || '请确认以下操作';
                modalContent.innerHTML = '<p>请选择您的操作。</p>';
                confirmBtn.style.display = 'inline-block';
                regenerateBtn.style.display = 'none';
                rejectBtn.style.display = 'inline-block';
            }
            
            modal.classList.add('show');
        }

        // 处理确认
        function handleConfirm(action) {
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = true;
            
            const modal = document.getElementById('confirmModal');
            modal.classList.remove('show');
            
            let requestBody = {
                action: action,
                confirmType: currentConfirmationType
            };
            
            // 如果是参数输入
            const paramInput = document.getElementById('paramInput');
            if (paramInput && paramInput.value) {
                // 这里简化处理，实际应该根据任务类型解析参数
                requestBody.params = {
                    inputValue: paramInput.value
                };
                addMessage(`✓ 已提交: ${paramInput.value}`, 'success');
            } else {
                const actionText = action === 'approved' ? '已确认' : 
                                 action === 'rejected' ? '已拒绝' : '重新生成中...';
                addMessage(actionText, 'success');
            }
            
            // 发送确认请求
            fetch(`/journey-assistant/hotel-assistant/confirm/${currentSessionId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => response.json())
            .then(data => {
                console.log('✅ 确认成功:', data);
                confirmBtn.disabled = false;
            })
            .catch(error => {
                console.error('❌ 确认失败:', error);
                addMessage('⚠️ 确认失败: ' + error.message, 'error');
                confirmBtn.disabled = false;
            });
        }

        // 键盘事件处理
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 页面加载完成
        window.onload = function() {
            console.log('🏨 酒店智能助手已就绪');
            updateConnectionStatus('', '未连接');
            updateWorkflowStatus('', '就绪');
        };
    </script>
</body>
</html>
